<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kantin Kampus 2 Mutu</title>
<style>
body { font-family: Arial; margin:0; padding:10px; background:#f5f5f5; }
.header { text-align:center; font-size:24px; margin-bottom:10px; font-weight:bold; }
.gear { font-size:22px; cursor:pointer; position:absolute; top:15px; right:15px; }
.menu { background:white; margin:5px 0; padding:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; }
.menu div.left { display:flex; align-items:center; }
.menu span.qty { margin:0 10px; min-width:20px; text-align:center; }
.menu span.price { margin-left:5px; color:gray; }
.button-small { padding:5px 8px; margin:0 2px; }
.footer { position:fixed; bottom:0; left:0; right:0; background:white; padding:10px; box-shadow:0 -2px 5px rgba(0,0,0,0.1); }
.hidden { display:none; }
#menuList { max-height: calc(100vh - 250px); overflow-y:auto; }
.delete-icon { cursor:pointer; color:red; margin-right:5px; }
h4.category { margin:10px 0 5px 0; }
input#tableNo { width:80px; margin-right:10px; }
</style>
</head>
<body>

<div class="header">Kantin Kampus 2 Mutu</div>
<div class="gear" onclick="toggleEdit()">⚙️</div>

<div id="menuList"></div>

<div class="footer">
  <input type="text" id="tableNo" placeholder="No Meja">
  <h3>Total: Rp <span id="total">0</span></h3>
  <button onclick="printNota()">Print Nota</button>
  <button onclick="resetCart()">Reset</button>
  <button onclick="showHistory()">Riwayat Pesanan</button>
</div>

<div id="historyList" class="hidden"></div>

<script>
// DATA
let menu = JSON.parse(localStorage.getItem("menu")) || [
  {name:"Es Teh", price:3000, qty:0, category:"Minuman"},
  {name:"Air Mineral", price:3000, qty:0, category:"Minuman"},
  {name:"Gorengan", price:2000, qty:0, category:"Jajanan"},
  {name:"Pop Ice", price:4000, qty:0, category:"Minuman"},
  {name:"Es Jeruk", price:4000, qty:0, category:"Minuman"}
];
let history = JSON.parse(localStorage.getItem("history")) || [];
let editMode = false;

// UTILITY FORMAT RUPIAH
function formatRp(x){
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

// SAVE
function saveMenu(){ localStorage.setItem("menu", JSON.stringify(menu)); }
function saveHistory(){ localStorage.setItem("history", JSON.stringify(history)); }

// RENDER MENU
function renderMenu(){
  const categories = ["Makanan","Minuman","Jajanan","Lainnya"];
  let html = "";
  categories.forEach(cat=>{
    const items = menu.filter(m=>m.category===cat);
    if(items.length>0){
      html += `<h4 class="category">${cat}</h4>`;
      items.forEach((m,i)=>{
        const idx = menu.indexOf(m);
        html += `<div class="menu">
          <div class="left">
            ${editMode ? `<span class="delete-icon" onclick="deleteMenu(${idx})">🗑️</span>` : ''}
            <b>${m.name}</b> 
            <span class="price">- Rp ${formatRp(m.price)}</span>
            ${editMode ? `<span style="cursor:pointer; margin-left:5px;" onclick="enableEdit(${idx})">✏️</span>` : ''}
          </div>
          <div>
            <button class="button-small" onclick="minus(${idx})">-</button>
            <span class="qty">${m.qty}</span>
            <button class="button-small" onclick="add(${idx})">+</button>
          </div>
        </div>`;
      });
    }
  });
  if(editMode){
    html += `<div style="margin-top:10px;">
      <button onclick="addNewMenuPrompt()">Tambah Menu</button>
    </div>`;
  }
  document.getElementById("menuList").innerHTML = html;
  hitungTotal();
}

// OPERASI MENU
function add(i){ menu[i].qty++; saveMenu(); renderMenu(); }
function minus(i){ if(menu[i].qty>0) menu[i].qty--; saveMenu(); renderMenu(); }
function resetCart(){ menu.forEach(m=>m.qty=0); saveMenu(); renderMenu(); }
function hitungTotal(){
  let total=0; menu.forEach(m=>total+=m.qty*m.price);
  document.getElementById("total").innerText=formatRp(total);
}

// EDIT / DELETE / ADD
function toggleEdit(){ editMode=!editMode; renderMenu(); }
function enableEdit(i){
  let newName=prompt("Nama Menu:",menu[i].name); if(newName) menu[i].name=newName;
  let newPrice=prompt("Harga:",menu[i].price); if(newPrice) menu[i].price=parseInt(newPrice);
  let newCat=prompt("Kategori (Makanan/Minuman/Jajanan/Lainnya):",menu[i].category);
  if(newCat) menu[i].category=newCat;
  saveMenu(); renderMenu();
}
function deleteMenu(i){ if(confirm("Hapus menu ini?")){ menu.splice(i,1); saveMenu(); renderMenu(); } }
function addNewMenuPrompt(){
  let name = prompt("Nama Menu Baru:"); if(!name) return;
  let price = prompt("Harga Menu Baru:"); if(!price) return;
  let cat = prompt("Kategori (Makanan/Minuman/Jajanan/Lainnya):","Makanan"); if(!cat) cat="Makanan";
  menu.push({name:name, price:parseInt(price), qty:0, category:cat});
  saveMenu(); renderMenu();
}

// PRINT NOTA & SIMPAN RIWAYAT
function printNota(){
  let tableNo = document.getElementById("tableNo").value || "-";
  let now = new Date(); let datetime = now.toLocaleString();
  let text=`<h2>NOTA KANTIN</h2><p>Meja: ${tableNo}</p><p>Waktu: ${datetime}</p><hr>`;
  let orderItems = [];
  menu.forEach(m=>{
    if(m.qty>0){
      text+=`<p>${m.name} x${m.qty} = Rp ${formatRp(m.qty*m.price)}</p>`;
      orderItems.push({name:m.name, qty:m.qty, price:m.price});
    }
  });
  let total = menu.reduce((sum,m)=>sum + m.qty*m.price,0);
  text+=`<hr><h3>Total: Rp ${formatRp(total)}</h3>`;
  if(orderItems.length>0){ history.push({table:tableNo, datetime:datetime, items:orderItems, total:total}); saveHistory(); }
  let w=window.open('','Nota','width=400,height=600'); w.document.write(text); w.document.close(); w.print();
  resetCart();
}

// RIWAYAT
function showHistory(){
  const el=document.getElementById("historyList");
  if(el.classList.contains("hidden")){
    el.classList.remove("hidden");
    let html="<h3>Riwayat Pesanan</h3>";
    history.forEach((h,i)=>{
      html+=`<p>${i+1}. Meja ${h.table} | ${h.datetime} | Total: Rp ${formatRp(h.total)}</p>`;
      h.items.forEach(it=>{
        html+=`<p style="margin-left:15px;">${it.name} x${it.qty} = Rp ${formatRp(it.qty*it.price)}</p>`;
      });
      html+="<hr>";
    });
    el.innerHTML=html;
  } else { el.classList.add("hidden"); }
}

renderMenu();
</script>
</body>
</html>
