<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantin Kampus 2 Mutu - Cloud Edition</title>
    <style>
        body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;background:#f0f2f5;padding-bottom:150px;}
        .header{text-align:center;font-size:24px;font-weight:bold;padding:15px;background:#1abc9c;color:white;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .gear{font-size:24px;cursor:pointer;position:absolute;top:15px;right:20px;color:white;transition:.3s;}
        .gear:hover{transform:rotate(20deg);}
        .add-btn{font-size:24px;cursor:pointer;position:absolute;top:15px;right:65px;color:white;}
        
        /* Loading Overlay */
        #loading{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.8);display:none;justify-content:center;align-items:center;z-index:9999;font-weight:bold;color:#1abc9c;}

        .menu-list{padding:10px; max-height: calc(100vh - 280px); overflow-y: auto;}
        h4.category{margin:15px 0 5px 0;font-size:18px;color:#34495e;border-bottom:2px solid #1abc9c;padding-bottom:3px;}
        .menu{background:white;margin:8px 0;padding:12px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,.05);}
        .menu b{font-size: 15px;}
        .price{color:#7f8c8d;font-size:13px;margin-left:5px;}
        
        .qty-controls{display:flex;align-items:center;gap:10px;}
        .btn-qty{width:30px;height:30px;border:none;border-radius:8px;background:#1abc9c;color:white;font-weight:bold;cursor:pointer;}
        
        .footer{position:fixed;bottom:0;width:100%;background:white;padding:15px;box-shadow:0 -3px 15px rgba(0,0,0,0.1);box-sizing:border-box;}
        .footer input{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid #ddd;box-sizing:border-box;}
        .footer-btns{display:flex;justify-content:space-between;align-items:center;gap:10px;}
        .btn-main{flex:1;padding:12px;border:none;border-radius:8px;background:#1abc9c;color:white;font-weight:bold;cursor:pointer;}

        #addMenuPopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:85%;max-width:350px;background:white;padding:20px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,0.3);display:none;z-index:1000;}
        #addMenuPopup input, #addMenuPopup select{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ddd;box-sizing:border-box;}
    </style>
</head>
<body>

<div id="loading">⏳ Menghubungkan ke Cloud...</div>

<div class="header">Kantin Kampus 2 Mutu</div>
<div class="gear" onclick="toggleEdit()">⚙️</div>
<div class="add-btn" onclick="showAddMenuPopup()">➕</div>

<div id="menuList" class="menu-list"></div>

<div class="footer">
    <input type="text" id="tableNo" placeholder="No Meja / Nama Pelanggan">
    <div class="footer-btns">
        <div style="flex:1">
            <small style="color:#7f8c8d">Total Bayar:</small>
            <h3 style="margin:0;color:#2c3e50">Rp <span id="total">0</span></h3>
        </div>
        <button class="btn-main" onclick="printNota()">PRINT & SIMPAN</button>
        <button class="btn-main" style="background:#e74c3c;flex:0.3" onclick="resetCart()">Reset</button>
    </div>
</div>

<div id="addMenuPopup">
    <h3 style="margin-top:0">Kelola Menu Cloud</h3>
    <input type="text" id="newMenuName" placeholder="Nama Menu">
    <input type="number" id="newMenuPrice" placeholder="Harga (Contoh: 5000)">
    <select id="newMenuCategory">
        <option value="Makanan">Makanan</option>
        <option value="Minuman">Minuman</option>
        <option value="Jajanan">Jajanan</option>
        <option value="Lainnya">Lainnya</option>
    </select>
    <button onclick="addMenuFromPopup()" style="width:100%;background:#1abc9c;color:white;border:none;padding:12px;border-radius:8px;margin-top:10px;font-weight:bold;">SIMPAN KE GOOGLE SHEET</button>
    <button onclick="closeAddMenuPopup()" style="width:100%;background:none;border:none;color:#95a5a6;margin-top:10px;cursor:pointer;">Batal</button>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynZFIEw6nJqfPPucOvvmQh9rZSmiC6BXgm3xDi8LtknrylxiTwa0QEdtWhAuoHTfXiCg/exec";

let menu = [];
let editMode = false;

// 1. LOAD DATA DARI GOOGLE SHEET (READ)
async function loadData() {
    toggleLoading(true);
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        // Beri qty: 0 untuk setiap item yang baru ditarik
        menu = data.map(item => ({ ...item, qty: 0 }));
        renderMenu();
    } catch (error) {
        console.error(error);
        alert("Gagal koneksi ke Cloud! Pastikan Apps Script sudah di-deploy sebagai 'Anyone'.");
    }
    toggleLoading(false);
}

// 2. RENDER TAMPILAN
function renderMenu() {
    const categories = ["Makanan", "Minuman", "Jajanan", "Lainnya"];
    let html = "";
    categories.forEach(cat => {
        const items = menu.filter(m => m.category === cat);
        if (items.length > 0) {
            html += `<h4 class="category">${cat}</h4>`;
            items.forEach((m) => {
                const idx = menu.indexOf(m);
                html += `<div class="menu">
                    <div>
                        ${editMode ? `<span style="cursor:pointer;margin-right:8px" onclick="deleteMenu(${idx})">🗑️</span>` : ""}
                        <b>${m.name}</b><br><span class="price">Rp ${parseInt(m.price).toLocaleString()}</span>
                    </div>
                    <div class="qty-controls">
                        <button class="btn-qty" onclick="updateQty(${idx},-1)">-</button>
                        <span style="min-width:20px;text-align:center;font-weight:bold">${m.qty}</span>
                        <button class="btn-qty" onclick="updateQty(${idx},1)">+</button>
                    </div>
                </div>`;
            });
        }
    });
    document.getElementById("menuList").innerHTML = html;
    hitungTotal();
}

function updateQty(i, n) {
    if (menu[i].qty + n >= 0) menu[i].qty += n;
    renderMenu();
}

function hitungTotal() {
    let total = menu.reduce((sum, item) => sum + (item.qty * item.price), 0);
    document.getElementById("total").innerText = total.toLocaleString();
}

// 3. SIMPAN PESANAN KE HISTORY (CREATE)
async function printNota() {
    const table = document.getElementById("tableNo").value || "Pelanggan Umum";
    const itemsOrdered = menu.filter(m => m.qty > 0);
    
    if (itemsOrdered.length === 0) return alert("Pilih menu dulu, Bos!");

    const total = itemsOrdered.reduce((sum, item) => sum + (item.qty * item.price), 0);
    // Format teks untuk kolom 'items' di Google Sheet agar rapi (Cara 1)
    const itemsText = itemsOrdered.map(it => `${it.name} (${it.qty})`).join(", ");

    toggleLoading(true);
    try {
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "saveOrder",
                table: table,
                datetime: new Date().toLocaleString("id-ID"),
                items: itemsText,
                total: total
            })
        });
        
        alert("Pesanan Tersimpan di Cloud!");
        window.print(); // Cetak nota fisik
        resetCart();
    } catch (e) {
        alert("Gagal kirim pesanan!");
    }
    toggleLoading(false);
}

// 4. CRUD MENU (UPDATE/DELETE)
async function syncMenuToCloud() {
    toggleLoading(true);
    try {
        // Kita kirim data menu tanpa property 'qty'
        const menuToSync = menu.map(({qty, ...rest}) => rest);
        await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "syncMenu", data: menuToSync })
        });
        await loadData(); // Refresh data
    } catch (e) { alert("Gagal update menu!"); }
    toggleLoading(false);
}

async function addMenuFromPopup() {
    const name = document.getElementById("newMenuName").value;
    const price = parseInt(document.getElementById("newMenuPrice").value);
    const category = document.getElementById("newMenuCategory").value;
    
    if (name && price) {
        menu.push({ name, price, category });
        await syncMenuToCloud();
        closeAddMenuPopup();
        document.getElementById("newMenuName").value = "";
        document.getElementById("newMenuPrice").value = "";
    } else {
        alert("Isi nama dan harga dulu!");
    }
}

function deleteMenu(i) {
    if (confirm("Hapus menu " + menu[i].name + " dari Cloud?")) {
        menu.splice(i, 1);
        syncMenuToCloud();
    }
}

// UI HELPERS
function toggleEdit() { editMode = !editMode; renderMenu(); }
function showAddMenuPopup() { document.getElementById("addMenuPopup").style.display = "block"; }
function closeAddMenuPopup() { document.getElementById("addMenuPopup").style.display = "none"; }
function resetCart() { menu.forEach(m => m.qty = 0); renderMenu(); }
function toggleLoading(show) { document.getElementById("loading").style.display = show ? "flex" : "none"; }

// JALANKAN SAAT START
loadData();
</script>

</body>
</html>
